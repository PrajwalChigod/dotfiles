fork = true
frame = "none"
idle = true
vsync = true
tabs = true

# macOS specific
macos_option_is_meta = "both"

[font]
normal = [{ family = "IoskeleyMono Nerd Font", style = "Regular" }]
size = 15.0
hinting = "slight"
edging = "subpixelantialias"

[cursor]
antialiasing = true
animation_length = 0.06
trail_size = 0.3
animate_in_insert_mode = true
animate_command_line = true

[scroll]
animation_length = 0.2
animation_far_lines = 1
